    applicability:
      kernel: ">=4.20 (PSI merged); RHEL9+ available; per-cgroup PSI: >=5.2"
      hardware: any
      software: any
    notes_for_distiller: |
      Cover: (1) what PSI measures: time fraction tasks spent stalled waiting for a
      resource; some (at least one task stalled) vs full (all tasks stalled);
      (2) reading /proc/pressure/{cpu,memory,io}: avg10/avg60/avg300 interpretation,
      what values are alarming; (3) per-cgroup PSI: `cat /sys/fs/cgroup/.../cpu.pressure`;
      (4) PSI as detection: PSI pressure > 5% avg60 is a meaningful signal;
      (5) PSI vs utilization: PSI captures stall time (demand > supply), utilization
      only captures busy time — a system can be 60% CPU util with 0% PSI or with 30% PSI;
      (6) using PSI for automated threshold-based alerts.

