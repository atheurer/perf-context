    title: "Tokenization CPU bottleneck in LLM serving: detection and mitigation"
    domain: gpu-ml
    corpus_path: corpus/gpu-ml/tokenization-cpu-bottleneck.md
    symptom_tags: [gpu-underutilized, ttft-high]
    source_ids: [vllm, pytorch-perf]
    applicability:
      kernel: any
      hardware: "any server CPU; GPU idle during tokenization"
      software: "vLLM >=0.4, HuggingFace tokenizers, any LLM serving stack"
    notes_for_distiller: |
      Cover: (1) tokenization is CPU-bound: BPE/wordpiece runs on CPU before GPU sees
      data; (2) detection: Nsight Systems shows gaps before first GPU kernel; CPU profile
      shows tokenizer threads hot; (3) HuggingFace fast tokenizers (Rust): much faster
      than Python; (4) async tokenization: pipeline tokenization for next request while
      GPU processes current; (5) batch tokenization: throughput better than per-request;
      (6) when this matters: short prefill, high request rate, CPU-constrained host.

  # ── Distributed domain ─────────────────────────────────────────────────────

  - id: tcp-incast
    title: "TCP incast: many-to-one collapse, rmem/wmem tuning"
    domain: distributed
    corpus_path: corpus/distributed/tcp-incast.md
    symptom_tags: [packet-drops, retransmits, p99-tail]
    source_ids: [gregg-sysperf-book, kernel-docs]
    source_paths:
      kernel-docs: [Documentation/networking/]
    applicability:
      kernel: any
      hardware: any data center NIC
      software: distributed systems with fan-in patterns (MapReduce, Ceph, k8s)
    notes_for_distiller: |
      Cover: (1) TCP incast: many servers respond simultaneously to one receiver →
      switch buffer overflow → drops → RTO (200ms+) → throughput collapse;
      (2) detection: `ss -ti` retransmit counters, `nstat` TCPRetransFail; switch
      microbursts via ECMP + buffer stats; (3) socket buffer tuning: `net.core.rmem_max`,
      `net.ipv4.tcp_rmem`; (4) TCP small queues (TSQ): limits in-flight per socket;
      (5) DCTCP for datacenter: `net.ipv4.tcp_congestion_control=dctcp`; (6) NIC
      ring buffer: `ethtool -G` rx/tx ring size — first line of defense against drops.

