# Tranche-0 target-unit manifest for perf-context corpus
#
# Purpose: demand-first fill of SYMPTOMS.md — enumerate the ~50 units that make
# the review agent useful before harvesting broadly. Feed each entry to
# agents/distiller-prompt.md after raw material is in the annex.
#
# Fields per unit:
#   id            unique kebab-case id; becomes the corpus filename stem
#   title         human title
#   domain        corpus/<domain>/ directory (methodology|observability|hardware|kernel|runtimes|distributed|gpu-ml)
#   corpus_path   target file path relative to repo root
#   symptom_tags  tags from SYMPTOMS.md vocabulary that this unit serves
#   source_ids    registry/sources.yaml source ids to distill from
#   source_paths  optional: paths within the source relevant to this unit
#   lwn_urls      curated LWN article URLs (free archive, >30 days old)
#   applicability kernel/hardware/software constraints
#   notes_for_distiller  guidance for the distiller agent for this unit specifically
#
# RHEL backport caveat (apply to all kernel units with kernel: "upstream >=X"):
#   RHEL kernels are heavily backported. Upstream version numbers are approximate.
#   Distiller MUST write: "upstream >=X; RHEL10 (6.12-based): yes; RHEL9 (5.14-based):
#   [no|yes if backported] — verify with `uname -r` + feature probe (see notes)."
#   Never trust upstream version alone for RHEL applicability.

units:

  # ── Kernel domain ──────────────────────────────────────────────────────────
  # Highest priority: these explain RHEL9→RHEL10 behavioral differences directly.

  - id: eevdf-vs-cfs
    title: "EEVDF scheduler vs CFS: behavior, applicability, and RHEL version split"
    domain: kernel
    corpus_path: corpus/kernel/eevdf-vs-cfs.md
    symptom_tags: [high-sys-cpu, run-queue-long, low-cpu-low-throughput]
    source_ids: [lwn, kernel-docs]
    source_paths:
      kernel-docs: [Documentation/scheduler/sched-eevdf.rst, Documentation/scheduler/sched-design-CFS.rst]
    lwn_urls:
      - https://lwn.net/Articles/925371/   # "An EEVDF CPU scheduler for Linux" (2023-02)
      - https://lwn.net/Articles/969349/   # EEVDF in 6.6, latency behavior notes
      - https://lwn.net/Articles/830donnerstag/  # CFS bandwidth throttling background
    applicability:
      kernel: "upstream >=6.6 (EEVDF merged); RHEL10 (kernel-6.12-based): yes; RHEL9 (kernel-5.14-based): CFS only — EEVDF not backported to RHEL9; verify with `uname -r` and `cat /sys/kernel/debug/sched/features 2>/dev/null | grep -i eevdf`"
      hardware: x86_64
      software: any
    notes_for_distiller: |
      THE primary unit for explaining RHEL9→RHEL10 throughput/latency differences.
      Cover: (1) how EEVDF differs from CFS mechanically — vruntime/lag accounting vs
      weighted fair share, deadline assignment, "eligible and deadline" scheduling;
      (2) observable behavioral differences: wakeup latency distribution, preemption
      frequency, fairness under mixed workload classes; (3) which metric deltas are
      diagnostic: perf sched latency, run-queue length distribution (mpstat run-queue
      depth), context switch rates; (4) known early-EEVDF regressions and whether they
      are fixed in 6.12; (5) the RHEL backport caveat. This unit must end with
      concrete discriminating measurements: what `perf sched timehist`, `sar -q`, and
      `perf stat -e context-switches` show differently between CFS and EEVDF kernels.

  - id: mglru-page-reclaim
    title: "MGLRU: multi-generational LRU page reclaim (RHEL10 default)"
    domain: kernel
    corpus_path: corpus/kernel/mglru-page-reclaim.md
    symptom_tags: [memory-pressure, swap-thrash, throughput-collapse]
    source_ids: [lwn, kernel-docs]
    source_paths:
      kernel-docs: [Documentation/mm/multigen_lru.rst, Documentation/admin-guide/mm/multigen_lru.rst]
    lwn_urls:
      - https://lwn.net/Articles/851817/   # "Multigenerational LRU: the next steps" (2021-07)
      - https://lwn.net/Articles/881876/   # MGLRU merged into mainline (2022-12)
      - https://lwn.net/Articles/914232/   # MGLRU performance results discussion
    applicability:
      kernel: "upstream >=6.1 (MGLRU merged); RHEL10 (kernel-6.12-based): yes, enabled by default; RHEL9: backported in RHEL9.3+ (kernel >=5.14.0-362), disabled by default — enable with `echo y > /sys/kernel/mm/lru_gen/enabled`; verify with `cat /sys/kernel/mm/lru_gen/enabled`"
      hardware: any
      software: any
    notes_for_distiller: |
      Cover: (1) problem with 2-list active/inactive LRU — why it ages pages poorly
      under mixed access patterns; (2) MGLRU mechanics: generations, aging vs eviction,
      how it tracks access frequency with minimal overhead; (3) workload classes that
      improve vs regress (streaming I/O, large working sets, mixed cold/hot pages);
      (4) how to detect MGLRU influence: compare `sar -B` (pgscank, pgsteal) and
      `/proc/vmstat` (workingset_activate, workingset_refault) between RHEL9 and RHEL10;
      (5) RHEL9 backport status and how to enable/disable for A/B comparison.

  - id: thp-transparent-hugepages
    title: "Transparent Huge Pages: defaults, overhead, and RHEL version changes"
    domain: kernel
    corpus_path: corpus/kernel/thp-transparent-hugepages.md
    symptom_tags: [memory-pressure, low-ipc, high-sys-cpu]
    source_ids: [kernel-docs, lwn, rhel-tuning-guides]
    source_paths:
      kernel-docs: [Documentation/admin-guide/mm/transhuge.rst]
    lwn_urls:
      - https://lwn.net/Articles/423584/   # THP introduction
      - https://lwn.net/Articles/787629/   # THP: "never" as default discussion
    applicability:
      kernel: "any; THP default changed between distro releases — verify `cat /sys/kernel/mm/transparent_hugepage/enabled`"
      hardware: x86_64 (2M pages); aarch64 (2M pages)
      software: any
    notes_for_distiller: |
      Cover: (1) THP mechanics: collapse, promote, split; (2) default mode differences:
      RHEL9 default=always vs RHEL10 madvise changes — verify current defaults;
      (3) khugepaged overhead: CPU cycles for collapse, stall during split;
      (4) workloads that benefit (large contiguous allocations) vs regress (many small
      short-lived allocations, GC-heavy runtimes); (5) how to detect THP activity:
      `/proc/vmstat` thp_* counters, `sar -B`; (6) disabling for controlled comparison:
      `echo madvise > /sys/kernel/mm/transparent_hugepage/enabled`.

