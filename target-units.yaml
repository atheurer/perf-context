      socket; rps_sock_flow_entries; (4) XPS: transmit side — tx queue → CPU map;
      (5) hardware RSS: how to check queue count (`ethtool -l`), whether HW is
      already distributing; (6) practical config commands for RHEL; (7) how to
      verify balance: `cat /proc/interrupts | grep <nic>` per-CPU counts.

  - id: kernel-spectre-mitigations
    title: "Spectre-class mitigation costs: retpoline, IBRS, IBPB overhead"
    domain: kernel
    corpus_path: corpus/kernel/kernel-spectre-mitigations.md
    symptom_tags: [high-sys-cpu, low-ipc]
    source_ids: [kernel-docs, lwn]
    source_paths:
      kernel-docs: [Documentation/admin-guide/hw-vuln/]
    lwn_urls:
      - https://lwn.net/Articles/741266/   # Meltdown and Spectre (2018-01)
      - https://lwn.net/Articles/752408/   # Spectre mitigations deep dive
      - https://lwn.net/Articles/820086/   # "The ongoing Spectre mitigation saga" (eIBRS)
      - https://lwn.net/Articles/878826/   # Retbleed and mitigation overhead
    applicability:
      kernel: "all; mitigation defaults and overhead vary significantly by kernel generation and CPU microcode"
      hardware: "x86_64 Intel/AMD; overhead varies by uarch — SKX vs ICX vs SPR vs Genoa"
      software: syscall-heavy workloads most affected
    notes_for_distiller: |
      Cover: (1) what each mitigation does: retpoline (indirect branch), IBRS/eIBRS
      (indirect branch restriction speculation), IBPB (prediction barrier), STIBP,
      SSBD; (2) overhead profile: retpoline ~0-5% syscall-light; IBRS legacy severe
      (up to 30% on some workloads); eIBRS much cheaper; IBPB on context switch
      expensive; (3) how to read current mitigation status: `cat /proc/cpuinfo | grep bugs`,
      `cat /sys/devices/system/cpu/vulnerabilities/*`; (4) RHEL9 vs RHEL10 default
      differences (newer kernels have cheaper mitigations on newer CPUs); (5) how
      to attribute: `perf stat -e syscalls:sys_enter_*` for syscall rate, compare
      with mitigation off (mitigations=off boot param) in lab only.

