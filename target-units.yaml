      software: network-intensive workloads
    notes_for_distiller: |
      Cover: (1) drop taxonomy: NIC ring buffer overflow (driver rx_missed_errors),
      qdisc drops (tc qdisc show), socket buffer drops (ss -s);  (2) measurement:
      `ethtool -S eth0 | grep -i drop`, `ip -s link`, `netstat -s` UDP recv errors;
      (3) ring buffer overflow: `ethtool -g` current rx ring size; fix with `ethtool -G
      rxo rx 4096`; (4) qdisc pfifo_fast vs fq_codel vs noqueue; `tc -s qdisc` stats;
      (5) `/proc/softirqs` NET_RX counts vs drops correlation; (6) `dropwatch` or
      bpftrace drop tracing for kernel drop location.

