      (4) when one CPU is pegged: IRQ affinity (smp_affinity), /proc/interrupts
      imbalance, RPS/RFS migration; (5) ksoftirqd: when it runs, what it means
      for latency; (6) sysctl levers: net.core.netdev_budget, net.core.busy_read.

