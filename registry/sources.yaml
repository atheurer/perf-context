# Seed source registry. license fields are initial guesses; harvester must
# verify (license_verified: true) before track assignment is final.
# priority: 1 = seed corpus, 2 = second wave, 3 = long tail
# cadence: once | monthly | quarterly | release (re-harvest on new release)
# track: core | digest | conservative | pointer (see LICENSE-POLICY.md)

sources:

  # ── Methodology ────────────────────────────────────────────────
  - id: gregg-site
    name: brendangregg.com (USE method, off-CPU analysis, flame graphs, one-liners, blog investigations)
    domain: [methodology, observability]
    method: fetch
    crawl_root: https://www.brendangregg.com/
    crawl_depth: 2
    license: all-rights-reserved
    license_verified: false
    track: digest
    annex_ok: true
    priority: 1
    cadence: quarterly
    notes: Blog investigation posts also yield playbooks. Books are separate pointer entries.

  - id: gregg-sysperf-book
    name: "Systems Performance 2e (Gregg) — book"
    domain: [methodology, observability, kernel]
    method: pointer
    url: https://www.brendangregg.com/systems-performance-2nd-edition-book.html
    license: proprietary
    track: pointer
    priority: 1
    cadence: once
    notes: Chapter-level pointer map; concept digests written independently.

  - id: easyperf-book
    name: "Performance Analysis and Tuning on Modern CPUs (Bakhvalov) — open book source"
    domain: [methodology, hardware, observability]
    method: git
    repo: https://github.com/dendibakh/perf-book
    paths: [chapters/]
    license: CC-BY-NC-ND-4.0
    license_verified: false
    track: conservative
    annex_ok: true
    priority: 1
    cadence: release
    notes: Verify current license; repo licensing has nuances. Extremely high density for TMA, PMU, uarch tuning.

  - id: jain-art-of-perf
    name: "The Art of Computer Systems Performance Analysis (Jain) + author slides"
    domain: [methodology]
    method: pointer
    url: https://www.cse.wustl.edu/~jain/books/perfbook.htm
    license: proprietary
    track: pointer
    priority: 2
    cadence: once
    notes: Queueing theory, experimental design, benchmarking statistics. Author-posted slides may be fetchable.

  - id: tail-at-scale
    name: "The Tail at Scale (Dean & Barroso, CACM 2013)"
    domain: [methodology, distributed]
    method: pointer
    url: https://research.google/pubs/the-tail-at-scale/
    license: ACM
    track: pointer
    priority: 1
    cadence: once

  - id: yasin-tma
    name: "A Top-Down Method for Performance Analysis and Counters Architecture (Yasin, ISPASS 2014)"
    domain: [methodology, hardware]
    method: pointer
    url: https://doi.org/10.1109/ISPASS.2014.6844459
    license: IEEE
    track: pointer
    priority: 1
    cadence: once

  - id: mytkowicz-wrong-data
    name: "Producing Wrong Data Without Doing Anything Obviously Wrong (ASPLOS 2009)"
    domain: [methodology]
    method: pointer
    url: https://doi.org/10.1145/1508244.1508275
    license: ACM
    track: pointer
    priority: 2
    cadence: once
    notes: Measurement bias; pair with STABILIZER and "Rigorous Benchmarking in Reasonable Time".

  - id: tene-coordinated-omission
    name: "Gil Tene — How NOT to Measure Latency (talk) + HdrHistogram docs"
    domain: [methodology]
    method: git
    repo: https://github.com/HdrHistogram/HdrHistogram
    paths: [README.md]
    license: BSD-2-Clause/public-domain
    license_verified: false
    track: core
    priority: 1
    cadence: once
    notes: Talk transcript to annex; coordinated-omission digest is mandatory seed content.

